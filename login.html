<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>coffin.sh — login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: #0a0a0a;
      color: #c9c9c9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.18) 2px,
        rgba(0,0,0,0.18) 4px
      );
    }

    .corner-tag {
      position: fixed;
      top: 1.5rem;
      right: 2rem;
      font-size: 11px;
      color: #333;
      letter-spacing: 0.06em;
      z-index: 10;
    }

    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #2a9d5c;
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .back-link {
      position: fixed;
      top: 1.5rem;
      left: 2rem;
      font-size: 11px;
      color: #333;
      text-decoration: none;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      z-index: 10;
      transition: color 0.3s ease;
      position: fixed;
      overflow: hidden;
    }

    .back-link:hover { color: #e03333; }

    .card {
      position: relative;
      z-index: 3;
      width: 100%;
      max-width: 320px;
      padding: 2.5rem 2rem;
      animation: flicker 8s infinite;
    }

    @keyframes flicker {
      0%, 97%, 100% { opacity: 1; }
      98% { opacity: 0.85; }
      99% { opacity: 1; }
      99.5% { opacity: 0.9; }
    }

    .logo {
      font-size: 13px;
      letter-spacing: 0.08em;
      color: #e03333;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    .divider {
      width: 32px;
      height: 1px;
      background: #e03333;
      opacity: 0.4;
      margin-bottom: 2rem;
    }

    .field {
      margin-bottom: 1.25rem;
    }

    .field label {
      display: block;
      font-size: 11px;
      color: #e03333;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid #222;
      color: #c9c9c9;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      padding: 6px 0;
      outline: none;
      transition: border-color 0.15s;
      caret-color: #e03333;
    }

    .field input:focus { border-bottom-color: #e03333; }
    .field input::placeholder { color: #2a2a2a; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 10px 20px;
      border-radius: 2px;
      border: 1px solid #e03333;
      cursor: pointer;
      color: #e03333;
      background: transparent;
      margin-top: 1.75rem;
      position: relative;
      overflow: hidden;
      transition: color 0.3s ease;
      z-index: 0;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255,255,255,0.08) 40%,
        rgba(255,255,255,0.18) 50%,
        rgba(255,255,255,0.08) 60%,
        transparent 100%
      ),
      linear-gradient(90deg, #e03333 0%, #e03333 100%);
      transition: left 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: -1;
    }

    .btn:hover::before { left: 0; }
    .btn:hover { color: #0a0a0a; }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
    }

    .error-msg {
      font-size: 11px;
      color: #e03333;
      margin-top: 1rem;
      min-height: 16px;
      letter-spacing: 0.04em;
    }

    .footer-links {
      margin-top: 2rem;
      display: flex;
      gap: 16px;
    }

    .footer-link {
      font-size: 11px;
      color: #333;
      text-decoration: none;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
      transition: color 0.3s ease;
    }

    .footer-link::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: -100%;
      width: 100%;
      height: 1px;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.4),
        #e03333,
        rgba(255,255,255,0.4),
        transparent
      );
      transition: left 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .footer-link:hover::before { left: 0; }
    .footer-link:hover { color: #e03333; }
  </style>
</head>
<body>
  <div class="scanlines"></div>
  <a class="back-link" href="/">← back</a>
  <span class="corner-tag"><span class="status-dot"></span>online</span>

  <div class="card">
    <div class="logo">coffin.sh</div>
    <div class="divider"></div>

    <div class="field">
      <label for="username">username</label>
      <input
        id="username"
        type="text"
        placeholder="username or @proxy"
        autocomplete="username"
        autocapitalize="none"
        spellcheck="false"
        oninput="handleInput(this)"
      />
    </div>

    <button class="btn" id="login-btn" onclick="handleAction()">login</button>
    <div class="error-msg" id="error-msg"></div>

    <div class="footer-links">
      <a class="footer-link" href="/tos.html">tos</a>
    </div>
  </div>

  <script>
    const btn = document.getElementById('login-btn');

    // Known profiles — add more here as needed
    const profiles = ['proxy'];

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleAction();
    });

    function handleInput(input) {
      const val = input.value.trim().toLowerCase().replace(/^@/, '');
      btn.textContent = profiles.includes(val) ? 'visit profile →' : 'login';
    }

    function handleAction() {
      const raw = document.getElementById('username').value.trim();
      const val = raw.toLowerCase().replace(/^@/, '');
      if (profiles.includes(val)) {
        window.location.href = '/proxy.html';
      } else {
        handleLogin(val);
      }
    }

    async function handleLogin(username) {
      const errorMsg = document.getElementById('error-msg');
      errorMsg.textContent = '';

      if (!username) {
        errorMsg.textContent = 'username required.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'logging in...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username }),
        });

        if (res.ok) {
          window.location.href = '/';
        } else {
          const data = await res.json().catch(() => ({}));
          errorMsg.textContent = data.detail || data.title || 'invalid username.';
          btn.disabled = false;
          btn.textContent = 'login';
        }
      } catch (err) {
        errorMsg.textContent = 'something went wrong. try again.';
        btn.disabled = false;
        btn.textContent = 'login';
      }
    }
  </script>
</body>
</html>
