<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>coffin.sh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: #0a0a0a;
      color: #c9c9c9;
      min-height: 100vh;
    }

    .cof-root {
      position: relative;
      overflow: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      animation: flicker 8s infinite;
    }

    .bg-img {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 0;
      height: 100vh;
      width: auto;
      object-fit: cover;
      object-position: center bottom;
      z-index: 0;
      pointer-events: none;
      filter: grayscale(1) brightness(0.9) contrast(1.1);
      mask-image: linear-gradient(to top, transparent 0%, black 15%);
      -webkit-mask-image: linear-gradient(to top, transparent 0%, black 15%);
      mix-blend-mode: screen;
    }

    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.18) 2px,
        rgba(0,0,0,0.18) 4px
      );
    }

    .content {
      position: relative;
      z-index: 3;
      display: grid;
      grid-template-columns: 1fr 1fr;
      flex: 1;
      padding: 2.5rem 2rem 3rem;
      gap: 2rem;
      min-height: 100vh;
    }

    .left { display: flex; flex-direction: column; }
    .right { display: flex; flex-direction: column; justify-content: flex-end; align-items: flex-end; }

    .logo {
      font-size: 13px;
      letter-spacing: 0.08em;
      color: #e03333;
      margin-bottom: 2rem;
      text-transform: uppercase;
    }

    .meta-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      font-size: 13px;
      line-height: 1.5;
    }

    .meta-label {
      color: #e03333;
      min-width: 60px;
      font-size: 12px;
      letter-spacing: 0.06em;
    }

    .meta-val a {
      color: #e03333;
      text-decoration: none;
      transition: color 0.15s;
    }

    .meta-val a:hover { color: #ff4444; }

    .divider {
      width: 32px;
      height: 1px;
      background: #e03333;
      opacity: 0.4;
      margin: 1.25rem 0;
    }

    .tos-note {
      font-size: 11px;
      color: #555;
      line-height: 1.6;
      max-width: 320px;
    }

    .tos-note a { color: #e03333; text-decoration: none; }
    .tos-note a:hover { text-decoration: underline; }

    .actions { margin-top: 1.5rem; }

    .btn {
      display: inline-flex;
      align-items: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 9px 20px;
      border-radius: 2px;
      border: 1px solid #e03333;
      cursor: pointer;
      color: #e03333;
      background: transparent;
      position: relative;
      overflow: hidden;
      transition: color 0.3s ease;
      z-index: 0;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255,255,255,0.08) 40%,
        rgba(255,255,255,0.18) 50%,
        rgba(255,255,255,0.08) 60%,
        transparent 100%
      ),
      linear-gradient(90deg, #e03333 0%, #e03333 100%);
      transition: left 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: -1;
    }

    .btn:hover::before {
      left: 0;
    }

    .btn:hover {
      color: #0a0a0a;
      border-color: #e03333;
    }

    .stat-block { text-align: right; }

    .stat-num {
      font-size: 36px;
      font-weight: 500;
      color: #e03333;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .stat-label {
      font-size: 11px;
      color: #444;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .corner-tag {
      position: fixed;
      top: 1.5rem;
      right: 2rem;
      font-size: 11px;
      color: #333;
      letter-spacing: 0.06em;
      z-index: 10;
    }

    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #2a9d5c;
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .social-links { display: flex; gap: 16px; margin-top: 1.5rem; }

    .social-link {
      font-size: 11px;
      color: #444;
      text-decoration: none;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
      transition: color 0.3s ease;
    }

    .social-link::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: -100%;
      width: 100%;
      height: 1px;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.4),
        #e03333,
        rgba(255,255,255,0.4),
        transparent
      );
      transition: left 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .social-link:hover::before { left: 0; }
    .social-link:hover { color: #e03333; }

    @keyframes flicker {
      0%, 97%, 100% { opacity: 1; }
      98% { opacity: 0.85; }
      99% { opacity: 1; }
      99.5% { opacity: 0.9; }
    }
  </style>
</head>
