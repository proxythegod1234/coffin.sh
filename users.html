<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>coffin.sh — users</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: #050505;
      color: #c9c9c9;
      min-height: 100vh;
    }

    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.18) 2px, rgba(0,0,0,0.18) 4px
      );
    }

    .glow-line {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, #e03333, transparent);
      opacity: 0.4;
      z-index: 30;
    }

    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2rem;
      border-bottom: 1px solid #0f0f0f;
      background: rgba(5,5,5,0.9);
    }

    .nav-logo {
      font-size: 11px;
      letter-spacing: 0.1em;
      color: #e03333;
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-logo:hover { color: #ff4444; }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .back-link {
      font-size: 11px;
      color: #333;
      text-decoration: none;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .back-link:hover { color: #e03333; }

    .status-dot {
      display: inline-block;
      width: 5px; height: 5px;
      background: #2a9d5c;
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── page ── */
    .page {
      position: relative;
      z-index: 3;
      max-width: 900px;
      margin: 0 auto;
      padding: 6rem 2rem 5rem;
    }

    /* ── header ── */
    .header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .header-left {}

    .header-label {
      font-size: 10px;
      color: #e03333;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .header-title {
      font-size: 22px;
      font-weight: 500;
      color: #fff;
      letter-spacing: 0.03em;
    }

    .header-count {
      font-size: 11px;
      color: #222;
      letter-spacing: 0.08em;
      margin-top: 4px;
    }

    .header-count span {
      color: #e03333;
    }

    /* ── search ── */
    .search-wrap {
      position: relative;
    }

    .search-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid #1a1a1a;
      color: #c9c9c9;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      padding: 6px 0;
      width: 200px;
      outline: none;
      caret-color: #e03333;
      letter-spacing: 0.04em;
      transition: border-color 0.2s;
    }

    .search-input:focus { border-bottom-color: #e03333; }
    .search-input::placeholder { color: #222; }

    /* ── divider ── */
    .divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, #e03333, transparent);
      margin-bottom: 2rem;
      opacity: 0.4;
    }

    /* ── user grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }

    .user-card {
      border: 1px solid #0f0f0f;
      padding: 1.25rem;
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s, color 0.3s;
      cursor: pointer;
      background: rgba(255,255,255,0.01);
    }

    .user-card::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255,255,255,0.02) 40%,
        rgba(255,255,255,0.05) 50%,
        rgba(255,255,255,0.02) 60%,
        transparent 100%
      ), linear-gradient(90deg, #0d0d0d, #0d0d0d);
      transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 0;
    }

    .user-card:hover::before { left: 0; }
    .user-card:hover { border-color: #1a1a1a; }

    .user-card > * { position: relative; z-index: 1; }

    /* owner card accent */
    .user-card.owner {
      border-color: rgba(224,51,51,0.15);
    }

    .user-card.owner:hover {
      border-color: rgba(224,51,51,0.35);
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center 10%;
      border: 1px solid #1a1a1a;
      flex-shrink: 0;
      filter: grayscale(0.2);
    }

    .avatar-placeholder {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid #1a1a1a;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 500;
      color: #333;
      background: #0a0a0a;
      text-transform: uppercase;
    }

    .owner .avatar,
    .owner .avatar-placeholder {
      border-color: rgba(224,51,51,0.3);
    }

    .user-info {
      flex: 1;
      min-width: 0;
    }

    .user-name {
      font-size: 13px;
      font-weight: 500;
      color: #c9c9c9;
      letter-spacing: 0.04em;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .owner .user-name { color: #e03333; }

    .user-handle {
      font-size: 10px;
      color: #2a2a2a;
      letter-spacing: 0.08em;
    }

    .user-badge {
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 2px;
      border: 1px solid;
      flex-shrink: 0;
    }

    .badge-owner {
      color: #e03333;
      border-color: rgba(224,51,51,0.3);
      background: rgba(224,51,51,0.05);
    }

    .badge-mod {
      color: #555;
      border-color: #1a1a1a;
      background: transparent;
    }

    .badge-dev {
      color: #444;
      border-color: #111;
      background: transparent;
    }

    .badge-beta {
      color: #4a9eff;
      border-color: rgba(74,158,255,0.25);
      background: rgba(74,158,255,0.04);
    }

    /* ── loading / empty ── */
    .state-msg {
      font-size: 11px;
      color: #222;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3rem 0;
      text-align: center;
    }

    .state-msg span { color: #e03333; }

    /* ── footer ── */
    .footer {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid #0f0f0f;
      font-size: 10px;
      color: #1a1a1a;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
    }

    .footer a { color: #222; text-decoration: none; transition: color 0.2s; }
    .footer a:hover { color: #e03333; }

    /* hide cards that don't match search */
    .user-card.hidden { display: none; }
  </style>
</head>

  <nav class="nav">
    <a class="nav-logo" href="/">coffin.sh</a>
    <div class="nav-right">
      <span style="font-size:10px;color:#222;letter-spacing:0.08em;"><span class="status-dot"></span>online</span>
      <a class="back-link" href="/">← back</a>
    </div>
  </nav>

  <div class="page">

    <div class="header">
      <div class="header-left">
        <div class="header-label">directory</div>
        <div class="header-title">users</div>
        <div class="header-count">
          <span id="visible-count">—</span> members
        </div>
      </div>
      <div class="search-wrap">
        <input class="search-input" id="search" type="text" placeholder="search users..." oninput="filterUsers(this.value)" autocomplete="off" spellcheck="false">
      </div>
    </div>

    <div class="divider"></div>

    <div class="grid" id="user-grid">
      <div class="state-msg" id="loading-msg">
        <span>⬡</span> loading users...
      </div>
    </div>

    <div class="footer">
      <a href="/">coffin.sh</a>
      <span>© 2025 coffin.sh</span>
    </div>

  </div>

  <script>
    // Pinned users always shown at top
    const PINNED = [
      {
        username: 'Proxy',
        handle: '@proxy',
        badge: 'owner',
        href: '/proxy.html',
        initials: 'P',
        num: '1',
      },
      {
        username: 'iracks',
        handle: '@iracks',
        badge: 'beta',
        href: '/iracks.html',
        initials: 'I',
        num: '2',
      }
    ];

    async function loadUsers() {
      const grid = document.getElementById('user-grid');
      const countEl = document.getElementById('visible-count');

      try {
        const res = await fetch('/api/users?page=1&pageSize=100', {
          method: 'GET',
          headers: { 'Content-Type': 'application/json' },
        });

        let apiUsers = [];
        if (res.ok) {
          const data = await res.json();
          apiUsers = (data.items || []).filter(u =>
            u.username.toLowerCase() !== 'proxy'
          );
        }

        grid.innerHTML = '';

        // Render pinned first
        PINNED.forEach(u => {
          grid.appendChild(makeCard(u, true));
        });

        // Render API users
        apiUsers.forEach(u => {
          grid.appendChild(makeCard({
            username: u.username,
            handle: '@' + u.username.toLowerCase(),
            badge: u.roles?.includes('Admin') ? 'mod' : null,
            href: '/' + u.username.toLowerCase(),
            initials: u.username[0],
          }, false));
        });

        const total = PINNED.length + apiUsers.length;
        countEl.textContent = total;

        if (total === 0) {
          grid.innerHTML = '<div class="state-msg">no users found.</div>';
        }

      } catch (err) {
        // API unavailable — just show pinned
        grid.innerHTML = '';
        PINNED.forEach(u => grid.appendChild(makeCard(u, true)));
        countEl.textContent = PINNED.length;
      }
    }

    function makeCard(u, isOwner) {
      const card = document.createElement('a');
      card.className = 'user-card' + (isOwner ? ' owner' : '');
      card.href = u.href || '#';
      card.dataset.name = u.username.toLowerCase();

      let avatarHtml;
      if (u.username === 'Proxy') {
        const pfpSrc = document.getElementById('proxy-pfp-src').src;
        avatarHtml = '<img class="avatar" src="' + pfpSrc + '">';
      } else if (u.username === 'iracks') {
        const pfpSrc = document.getElementById('iracks-pfp-src').src;
        avatarHtml = '<img class="avatar" src="' + pfpSrc + '">';
      } else {
        avatarHtml = '<div class="avatar-placeholder">' + u.initials + '</div>';
      }
      const avatar = avatarHtml;

      const badge = u.badge
        ? `<span class="user-badge badge-${u.badge}">${u.badge}</span>`
        : '';

      const numTag = u.num ? `<span style="font-size:9px;color:#1a1a1a;letter-spacing:0.1em;margin-right:2px">#${u.num}</span>` : '';
      card.innerHTML = `
        ${avatar}
        <div class="user-info">
          <div class="user-name">${numTag}${u.username}</div>
          <div class="user-handle">${u.handle}</div>
        </div>
        ${badge}
      `;

      return card;
    }

    function filterUsers(query) {
      const q = query.toLowerCase().replace(/^@/, '');
      const cards = document.querySelectorAll('.user-card');
      let visible = 0;
      cards.forEach(c => {
        const match = c.dataset.name.includes(q);
        c.classList.toggle('hidden', !match);
        if (match) visible++;
      });
      document.getElementById('visible-count').textContent = visible;
    }

    loadUsers();
  </script>
